                            - const: brokered_url
                              type: string
                        url:
                          format: uri
                          type: string
                    - type: "null"
                summary_overrides:
                  additionalProperties: false
                  type: object
                  properties:
                    provider:
                      type: string
          multipart/form-data:
            schema:
              additionalProperties: false
              type: object
              required:
                - agent_card_url
                - visibility
              properties:
                agent_card_url:
                  type: string
                visibility:
                  type: string
                  enum:
                    - public
                    - restricted
                facts_ref:
                  anyOf:
                    - additionalProperties: false
                      type: object
                      required:
                        - type
                        - url
                      properties:
                        type:
                          anyOf:
                            - const: public_url
                              type: string
                            - const: brokered_url
                              type: string
                        url:
                          format: uri
                          type: string
                    - type: "null"
                summary_overrides:
                  additionalProperties: false
                  type: object
                  properties:
                    provider:
                      type: string
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                additionalProperties: false
                type: object
                required:
                  - agent_id
                  - status
                properties:
                  agent_id:
                    pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*(?:\.[a-z0-9]+(?:-[a-z0-9]+)*)+$
                    type: string
                  status:
                    const: pending_verification
                    type: string
                  challenge:
                    additionalProperties: false
                    type: object
                    required:
                      - method
                      - url
                      - token
                      - expires_at
                    properties:
                      method:
                        const: well_known_token
                        type: string
                      url:
                        format: uri
                        type: string
                      token:
                        type: string
                      expires_at:
                        format: date-time
                        type: string
        "201":
          description: Response for status 201
