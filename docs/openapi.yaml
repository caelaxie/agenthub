                        type: string
                      url:
                        format: uri
                        type: string
                      token:
                        type: string
                      expires_at:
                        format: date-time
                        type: string
                  last_validated_at:
                    format: date-time
                    type: string
                  verified_at:
                    anyOf:
                      - format: date-time
                        type: string
                      - type: "null"
                  last_error:
                    anyOf:
                      - type: string
                      - type: "null"
        "400":
          description: Response for status 400
          content:
