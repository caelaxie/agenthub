openapi: 3.0.3
info:
  title: AgentHub API
  description: Architecture-first scaffold for the AgentHub registry API.
  version: 0.1.0
tags:
  - name: Health
    description: Service health and readiness routes.
  - name: Publication
    description: Publisher write and administrative routes.
  - name: Verification
    description: Domain verification routes for pending publications.
  - name: Discovery
    description: Public lookup and search routes.
paths:
  /health:
    get:
      summary: Service health
      tags:
        - Health
      responses:
        "200":
          description: Response for status 200
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                  - version
                  - timestamp
                properties:
                  status:
                    const: ok
                    type: string
                  service:
                    default: AgentHub
                    type: string
                  version:
                    default: 0.1.0
                    type: string
                  timestamp:
                    format: date-time
                    type: string
      operationId: getHealth
  /v1/publish/agents/{agentId}:
    put:
      summary: Publish or update an agent
      tags:
        - Publication
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*(?:\.[a-z0-9]+(?:-[a-z0-9]+)*)+$
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              required:
                - agent_card_url
                - visibility
              properties:
                agent_card_url:
                  type: string
                visibility:
                  type: string
                  enum:
                    - public
                    - restricted
                facts_ref:
                  anyOf:
                    - additionalProperties: false
                      type: object
                      required:
                        - type
                        - url
                      properties:
                        type:
                          anyOf:
                            - const: public_url
                              type: string
                            - const: brokered_url
                              type: string
                        url:
                          format: uri
                          type: string
                    - type: "null"
                summary_overrides:
                  additionalProperties: false
                  type: object
                  properties:
                    provider:
                      type: string
          application/x-www-form-urlencoded:
            schema:
              additionalProperties: false
              type: object
              required:
                - agent_card_url
                - visibility
              properties:
                agent_card_url:
                  type: string
